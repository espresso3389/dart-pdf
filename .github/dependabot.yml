version: 2

updates:
  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # Pub dependencies for the whole workspace. Pub workspaces must resolve
  # from the root; running Dependabot inside member directories fails with
  # "Only apply dependency_services to the root of the workspace."
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
    groups:
      pub:
        patterns:
          - "*"
    ignore:
      # Internal workspace packages are versioned together by release tags,
      # not by Dependabot.
      - dependency-name: pdf_cos
      - dependency-name: pdf_document
      - dependency-name: pdf_graphics
      - dependency-name: pdf_test_fixtures
      - dependency-name: dart_pdf_editor
