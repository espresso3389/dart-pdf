name: Deploy Demo Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/deploy-demo-web.yml
      - pubspec.yaml
      - packages/pdf_cos/**
      - packages/pdf_document/**
      - packages/pdf_graphics/**
      - packages/dart_pdf_editor/**

concurrency:
  group: demo-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - run: flutter pub get

      # Compile the dedicated Web Worker that runs page interpretation + image
      # decode off the UI thread. Without it the viewer silently falls back to
      # on-thread rendering, so heavy PDFs hang the demo while scrolling.
      - name: Build the render worker
        working-directory: packages/dart_pdf_editor/example
        run: dart run dart_pdf_editor:build_web_worker

      # --wasm builds the skwasm (WebAssembly) renderer; the COOP/COEP headers
      # in firebase.json make it multithreaded (SharedArrayBuffer).
      - run: flutter build web --release --wasm
        working-directory: packages/dart_pdf_editor/example

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DART_PDF_DEMO }}
          projectId: dart-pdf-demo
          channelId: live
          entryPoint: packages/dart_pdf_editor/example
