name: Marketing screenshots

# Captures native device screenshots of the DartPDF app and the example app
# and frames them onto the gradient marketing canvas at store dimensions.
# Manual / on-demand only — it boots simulators + an emulator and is slow.
# Artifacts (doc/marketing + doc/screenshots) are attached to the run.

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'Targets (space-separated): app example'
        default: 'app example'
      apple_platforms:
        description: 'Apple platforms: ios macos'
        default: 'ios macos'

permissions:
  contents: read

jobs:
  # iOS (simctl) + macOS (window crop) on a macOS runner with a GUI session.
  apple:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true
      - name: Install rsvg-convert (marketing compose)
        run: brew install librsvg
      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - name: Capture + compose (iOS, macOS)
        # macOS window cropping queries window bounds via System Events; if the
        # runner's automation permission blocks it the capture falls back to a
        # full-display grab (documented in doc/screenshots/README.md). iOS uses
        # simctl and never needs automation.
        run: |
          packages/dart_pdf_editor/example/tool/screenshots.sh \
            ${{ github.event.inputs.targets }} ${{ github.event.inputs.apple_platforms }}
      - uses: actions/upload-artifact@v4
        with:
          name: marketing-apple
          path: |
            doc/marketing/**
            doc/screenshots/**
          if-no-files-found: warn

  # Android via an emulator on Linux (KVM-accelerated).
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true
      - name: Install rsvg-convert (marketing compose)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin
      - run: flutter pub get
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Capture + compose (Android)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            packages/dart_pdf_editor/example/tool/screenshots.sh \
              ${{ github.event.inputs.targets }} android
      - uses: actions/upload-artifact@v4
        with:
          name: marketing-android
          path: |
            doc/marketing/**
            doc/screenshots/**
          if-no-files-found: warn
