<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DartPDF — a fully native Flutter PDF editor">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="DartPDF">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>DartPDF</title>
  <link rel="manifest" href="manifest.json">

  <!-- File Handling API bridge: when the installed PWA is launched to open a
       .pdf, buffer the file(s) until the Dart side registers a consumer, then
       forward each as { name, bytes }. -->
  <script>
    (function () {
      var queued = [];
      var consumer = null;
      window.__dartPdfDrainLaunchFiles = function (cb) {
        consumer = cb;
        queued.forEach(function (e) { cb(e); });
        queued = [];
      };
      if ('launchQueue' in window && 'LaunchParams' in window &&
          'files' in LaunchParams.prototype) {
        window.launchQueue.setConsumer(async function (params) {
          for (const handle of params.files) {
            try {
              const file = await handle.getFile();
              const buf = await file.arrayBuffer();
              const entry = { name: file.name, bytes: new Uint8Array(buf) };
              if (consumer) { consumer(entry); } else { queued.push(entry); }
            } catch (err) { console.error('launch file error', err); }
          }
        });
      }
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
