# Per-package coverage flags for the dart-pdf workspace. Each package's tests
# upload under its own flag (see .github/workflows/ci.yml), so the README
# coverage badges can be scoped per package.
flag_management:
  default_rules:
    carryforward: true

flags:
  pdf_cos:
    paths:
      - packages/pdf_cos/lib
  pdf_document:
    paths:
      - packages/pdf_document/lib
  pdf_graphics:
    paths:
      - packages/pdf_graphics/lib
  dart_pdf_editor:
    paths:
      - packages/dart_pdf_editor/lib
  pdf_ocr_vlm:
    paths:
      - packages/pdf_ocr_vlm/lib
  app:
    paths:
      - app/lib

ignore:
  - "**/test/**"

coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        # New code (the PR diff) must keep meaningful coverage without making
        # UI-only branches fail solely for platform and host-callback glue.
        target: 65%
        # Allow a small slack so trivial diffs don't fail on rounding.
        threshold: 1%
        # Block the PR status when the diff drops below target.
        informational: false

comment:
  layout: "reach, diff, flags, files"
