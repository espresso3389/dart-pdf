<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400">
  <!-- dart-pdf banner. Text uses Helvetica Neue, so render banner.png on
       macOS (rsvg-convert -w 2560 banner.svg -o banner.png). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16BAFD"/>
      <stop offset="1" stop-color="#0169B4"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0175C2"/>
      <stop offset="1" stop-color="#13B9FD"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#13B9FD"/>
      <stop offset="1" stop-color="#0175C2"/>
    </linearGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dy="16"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="400" fill="#202124"/>

  <!-- the mark, scaled from logo.svg -->
  <g transform="translate(96 72) scale(0.25)">
    <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
    <g filter="url(#drop)">
      <path d="M 304 192 H 612 L 752 332 V 800 Q 752 832 720 832 H 304 Q 272 832 272 800 V 224 Q 272 192 304 192 Z"
            fill="#FFFFFF"/>
    </g>
    <path d="M 304 192 H 612 L 752 332 V 800 Q 752 832 720 832 H 304 Q 272 832 272 800 V 224 Q 272 192 304 192 Z"
          fill="#FFFFFF"/>
    <path d="M 612 192 L 752 332 H 646 Q 612 332 612 298 Z" fill="#C6E3F8"/>
    <rect x="332" y="396" width="216" height="34" rx="17" fill="#8FA6B5"/>
    <rect x="332" y="478" width="384" height="40" rx="20" fill="#FFC93C"/>
    <rect x="332" y="566" width="340" height="32" rx="16" fill="#C4D2DC"/>
    <path d="M 330 748 C 384 642 462 642 506 716 C 542 776 584 772 618 718 C 646 674 686 690 702 712"
          fill="none" stroke="url(#ink)" stroke-width="32" stroke-linecap="round"/>
  </g>

  <text x="416" y="208" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="120" font-weight="bold" fill="#FFFFFF">dart-pdf</text>
  <rect x="420" y="236" width="440" height="8" rx="4" fill="url(#rule)"/>
  <text x="416" y="300" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="36" fill="#9AA0A6">Pure-Dart PDF renderer &amp; editor for Flutter</text>
</svg>
