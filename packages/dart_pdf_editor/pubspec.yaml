name: dart_pdf_editor
description: >-
  Flutter PDF viewer and editor rendered natively in Dart — zooming viewer,
  text selection and search, annotation authoring, form filling, signatures,
  and page management. No platform plugins.
version: 0.1.0
repository: https://github.com/ben-milanko/dart-pdf/tree/main/packages/dart_pdf_editor
issue_tracker: https://github.com/ben-milanko/dart-pdf/issues
topics:
  - pdf
  - pdf-viewer
  - pdf-editor
  - annotations
  - forms
resolution: workspace

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  image: ^4.9.1
  pdf_cos: ^0.1.0
  pdf_document: ^0.1.0
  pdf_graphics: ^0.1.0
  shared_preferences: ^2.3.0

dev_dependencies:
  pdf_test_fixtures: ^0.1.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
