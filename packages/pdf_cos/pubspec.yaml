name: pdf_cos
description: >-
  COS object layer for PDF: tokenizer, parser, filters (incl. CCITT, JBIG2,
  JPEG 2000), xref machinery, encryption, and serializer. Pure Dart, web-ready.
version: 1.2.0
repository: https://github.com/ben-milanko/dart-pdf/tree/main/packages/pdf_cos
issue_tracker: https://github.com/ben-milanko/dart-pdf/issues
topics:
  - pdf
  - parser
  - serialization
  - encryption
# Throwaway RSA test key used by the PKI known-answer tests.
false_secrets:
  - /test/pki_test.dart
resolution: workspace

environment:
  sdk: ^3.5.0

dependencies:
  archive: ^4.0.0
  crypto: ^3.0.0

dev_dependencies:
  pdf_test_fixtures: ^1.2.0
  lints: ^5.0.0
  test: ^1.25.0
