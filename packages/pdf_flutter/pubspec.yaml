name: pdf_flutter
description: >-
  Flutter widgets for viewing and editing PDF documents, rendered natively
  in Dart. The only package in this workspace allowed to import dart:ui.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  pdf_cos: ^0.1.0
  pdf_document: ^0.1.0
  pdf_graphics: ^0.1.0

dev_dependencies:
  pdf_test_fixtures: ^0.1.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
