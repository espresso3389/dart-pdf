name: pdf_ocr_ondevice
description: >-
  On-device OCR engine for dart_pdf_editor that adds a selectable, searchable
  text layer to scanned PDFs with a downloadable PP-OCR ONNX model.
version: 1.2.1
repository: https://github.com/ben-milanko/dart-pdf/tree/main/packages/pdf_ocr_ondevice
issue_tracker: https://github.com/ben-milanko/dart-pdf/issues
topics:
  - pdf
  - ocr
  - text-recognition
  - on-device
  - scanned-documents
resolution: workspace

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  dart_pdf_editor: ^1.2.0
  pdf_document: ^1.2.0
  http: ^1.2.0
  crypto: ^3.0.0
  path_provider: ^2.1.0
  onnxruntime: ^1.4.1

dev_dependencies:
  pdf_graphics: ^1.2.0
  pdf_test_fixtures: ^1.2.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
