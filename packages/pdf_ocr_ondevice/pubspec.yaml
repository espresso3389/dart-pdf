name: pdf_ocr_ondevice
description: >-
  On-device, downloadable OCR engine for dart_pdf_editor — add a selectable,
  searchable text layer over scanned PDF pages with a small PP-OCR model that
  downloads once and runs locally on ONNX Runtime (no per-page network call).
version: 0.1.0
repository: https://github.com/ben-milanko/dart-pdf/tree/main/packages/pdf_ocr_ondevice
issue_tracker: https://github.com/ben-milanko/dart-pdf/issues
topics:
  - pdf
  - ocr
  - text-recognition
  - on-device
  - scanned-documents
resolution: workspace

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  dart_pdf_editor: ^1.0.0
  pdf_document: ^1.0.0
  http: ^1.2.0
  crypto: ^3.0.0
  path_provider: ^2.1.0
  onnxruntime: ^1.4.1

dev_dependencies:
  pdf_graphics: ^1.0.0
  pdf_test_fixtures: ^1.0.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
