name: pdf_test_fixtures
description: >-
  Programmatically-built PDF files for testing PDF tooling. Builders compute
  every offset, so fixtures are always structurally correct.
version: 0.1.0
repository: https://github.com/ben-milanko/dart-pdf/tree/main/packages/pdf_test_fixtures
issue_tracker: https://github.com/ben-milanko/dart-pdf/issues
topics:
  - pdf
  - testing
  - fixtures
# The test signer identity is a deliberately-published throwaway key,
# used only to exercise signature creation/validation in tests.
false_secrets:
  - /lib/src/signer_identity.dart
resolution: workspace

environment:
  sdk: ^3.5.0

dependencies:
  crypto: ^3.0.0
  pdf_cos: ^0.1.0

dev_dependencies:
  lints: ^5.0.0
