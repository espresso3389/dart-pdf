name: dart_pdf_workspace
description: Workspace for a pure-Dart PDF rendering and editing toolkit.
publish_to: none

environment:
  sdk: ^3.5.0

workspace:
  - packages/pdf_cos
  - packages/pdf_document
  - packages/pdf_graphics
  - packages/pdf_ocr_vlm
  - packages/pdf_ocr_ondevice
  - packages/dart_pdf_editor
  - packages/dart_pdf_editor/example
  - packages/pdf_test_fixtures
  - app
