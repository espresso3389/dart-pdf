<!doctype html>
<meta charset="utf-8">
<title>PDF corpus renders</title>
<style>
body{font:14px system-ui,sans-serif;margin:24px;background:#f6f7f8;color:#202124}
h1{font-size:20px;margin:0 0 16px}
.results{display:flex;flex-direction:column;gap:16px}
.result{margin:0;padding:12px;background:white;border:1px solid #dadce0;border-radius:6px}
.meta{margin:0 0 10px;overflow-wrap:anywhere;color:#3c4043}
.shots{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;align-items:start}
.shot-label{font-size:12px;color:#5f6368;margin:0 0 6px}
img{display:block;max-width:100%;height:auto;background:white;border:1px solid #eee}
.missing{border:1px dashed #dadce0;color:#80868b;padding:32px 8px;text-align:center;background:#fafafa}
@media (max-width: 900px){.shots{grid-template-columns:1fr}}
</style>
<h1>PDF corpus renders</h1>
<div class="results">
<figure class="result">
<figcaption class="meta">pattern_text_embedded_font.pdf page 1<br>596x842<br>5.011% differing pixels</figcaption>
<div class="shots">
<div><div class="shot-label">PDF.js baseline</div><a href="pattern_text_embedded_font.pdf.p0.baseline.png"><img src="pattern_text_embedded_font.pdf.p0.baseline.png" loading="lazy"></a></div>
<div><div class="shot-label">Dart render</div><a href="pattern_text_embedded_font.pdf.p0.dart.png"><img src="pattern_text_embedded_font.pdf.p0.dart.png" loading="lazy"></a></div>
<div><div class="shot-label">Diff</div><a href="pattern_text_embedded_font.pdf.p0.diff.png"><img src="pattern_text_embedded_font.pdf.p0.diff.png" loading="lazy"></a></div>
</div>
</figure>
<figure class="result">
<figcaption class="meta">text_clip_cff_cid.pdf page 1<br>580x200<br>0.008% differing pixels</figcaption>
<div class="shots">
<div><div class="shot-label">PDF.js baseline</div><a href="text_clip_cff_cid.pdf.p0.baseline.png"><img src="text_clip_cff_cid.pdf.p0.baseline.png" loading="lazy"></a></div>
<div><div class="shot-label">Dart render</div><a href="text_clip_cff_cid.pdf.p0.dart.png"><img src="text_clip_cff_cid.pdf.p0.dart.png" loading="lazy"></a></div>
<div><div class="shot-label">Diff</div><a href="text_clip_cff_cid.pdf.p0.diff.png"><img src="text_clip_cff_cid.pdf.p0.diff.png" loading="lazy"></a></div>
</div>
</figure>
</div>
